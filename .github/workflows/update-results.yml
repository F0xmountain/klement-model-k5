name: Ingest Match Results

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours during the tournament
  workflow_dispatch:          # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Ingest finished World Cup results (football-data.org)
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: node scripts/fetch-results-footballdata.mjs

      - name: Rebuild championship-probability timeline
        run: npx --yes tsx scripts/update-probability-timeline.ts

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/results.json lib/elo-current.json lib/probability-snapshots.json lib/match-stats.json
          git diff --staged --quiet || git commit -m "chore: ingest WC results $(date +%Y-%m-%d)"
          git push

      - name: Trigger Next.js on-demand revalidation
        run: |
          curl -sf -X POST \
            "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/revalidate?secret=${{ secrets.REVALIDATE_TOKEN }}" \
            || echo "Revalidation skipped (no URL configured)"
