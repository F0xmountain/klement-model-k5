name: Ingest Match Results

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours during the tournament
  workflow_dispatch:          # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Ingest finished World Cup results
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/fetch-results.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/results.json lib/elo-current.json
          git diff --staged --quiet || git commit -m "chore: ingest WC results $(date +%Y-%m-%d)"
          git push

      - name: Trigger Next.js on-demand revalidation
        run: |
          curl -sf -X POST \
            "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/revalidate?secret=${{ secrets.REVALIDATE_TOKEN }}" \
            || echo "Revalidation skipped (no URL configured)"
