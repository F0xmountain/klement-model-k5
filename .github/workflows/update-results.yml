name: Ingest Match Results

on:
  schedule:
    # Wedstrijddag-venster: elke 30 min van 16:00 tot 04:30 UTC
    # (= 18:00-06:30 CEST), dekt de WK-avond/nacht-wedstrijden incl. naspeeltijd.
    # Twee regels omdat het UTC-venster over middernacht heen loopt.
    # NB: na de groepsfase terug te zetten naar minder frequent (bv. '0 */6 * * *').
    - cron: '0,30 16-23 * * *'
    - cron: '0,30 0-4 * * *'
  workflow_dispatch:          # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Pull latest main before ingest
        run: git pull --rebase origin main

      - name: Ingest finished World Cup results (football-data.org)
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: node scripts/fetch-results-footballdata.mjs

      - name: Rebuild championship-probability timeline
        run: npx --yes tsx scripts/update-probability-timeline.ts

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/results.json lib/elo-current.json lib/probability-snapshots.json lib/match-stats.json
          git diff --staged --quiet || git commit -m "chore: ingest WC results $(date +%Y-%m-%d)"
          git pull --rebase && git push

      - name: Trigger Next.js on-demand revalidation
        run: |
          curl -sf -X POST \
            "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/revalidate?secret=${{ secrets.REVALIDATE_TOKEN }}" \
            || echo "Revalidation skipped (no URL configured)"
