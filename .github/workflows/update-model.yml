name: Refit Model

on:
  schedule:
    - cron: '*/10 * * * *'   # poll for finished matches every 10 minutes
  repository_dispatch:
    types: [match-finished]   # webhook-driven refit after a match ends
  workflow_dispatch:

concurrency:
  group: refit-model
  cancel-in-progress: false

jobs:
  refit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Sync live results and refit model
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/update-live.js

      - name: Commit refreshed model artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lib/model
          git diff --staged --quiet || git commit -m "chore: refit model $(date -u +%Y-%m-%dT%H:%MZ)"
          git push

      - name: Trigger Next.js on-demand revalidation
        run: |
          curl -sf -X POST \
            "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/revalidate?secret=${{ secrets.REVALIDATE_TOKEN }}" \
            || echo "Revalidation skipped (no URL configured)"
